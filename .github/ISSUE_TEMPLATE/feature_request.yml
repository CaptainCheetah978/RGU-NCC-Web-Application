name: Feature Request
description: Suggest a new feature for the NCC Cadet Management System
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion! Please describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Is your feature request related to a problem? Describe it.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: I would like...
    validations:
      required: true

  - type: checkboxes
    id: target-role
    attributes:
      label: Target Users
      description: Who would benefit from this feature?
      options:
        - label: ANO (Associate NCC Officer)
        - label: CSUO / CUO / CJUO
        - label: Cadets
        - label: All Users

  - type: dropdown
    id: module
    attributes:
      label: Related Module
      options:
        - Login / Authentication
        - Dashboard
        - Attendance
        - Digital ID Card
        - Cadet Registry
        - Notes / Messaging
        - Announcements
        - Training Sheet
        - Profile / Settings
        - New Module
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups.
    validations:
      required: false
